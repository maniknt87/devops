---
- name: Configure Linux VM
  hosts: linux
  become: yes

  tasks:

  - name: Install Nginx
    apt:
      name: nginx
      state: present
      update_cache: yes

  - name: Copy custom web page
    copy:
      src: ../files/index.html
      dest: /var/www/html/index.html

  - name: Start Nginx
    service:
      name: nginx
      state: started
      enabled: yes